<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamran Akhtar Digital Clock</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">

    <button id="theme-toggle">☀️ Light Mode</button>

    <h1 class="user-name">Kamran Akhtar
        <i>(Web Developer)</i>
    </h1>

    <div class="clock-container">
        <div class="time-box">
            <span id="hours">00</span>
            <p>HOURS</p>
        </div>
        <div class="colon">:</div>
        <div class="time-box">
            <span id="minutes">00</span>
            <p>MINUTES</p>
        </div>
        <div class="colon">:</div>
        <div class="time-box">
            <span id="seconds">00</span>
            <p>SECONDS</p>
        </div>
        <div class="time-box ampm-box">
            <span id="ampm">PM</span>
        </div>
    </div>

    <div id="date-display">Loading Date...</div>

    <div class="alarm-section">
        <input type="time" id="alarmTime">
        <button id="setAlarmBtn">Set Alarm</button>
        <p id="alarmStatus">No Alarm Set</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
