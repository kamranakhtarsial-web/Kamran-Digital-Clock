<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamran Akhtar Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <button id="theme-toggle">☀️ Light Mode</button>

    <h1 class="user-name">Kamran Akhtar <i>(Web Developer)</i></h1>

    <div class="clock-container">
        <div class="time-box">
            <span id="hours">00</span>
            <p>HOURS</p>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <p>MINUTES</p>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <p>SECONDS</p>
        </div>
        <div class="time-box">
            <span id="ampm">AM</span>
        </div>
    </div>

    <div id="date-display" style="margin-top: 20px; font-size: 1.2rem;"></div>

    <div class="alarm-section">
        <input type="time" id="alarmTime">
        <button id="setAlarmBtn">Set Alarm</button>
        <p id="alarmStatus">No Alarm Set</p>
    </div>

    <div id="alarm-popup" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 0 20px rgba(255,0,0,0.5); width: 85%; max-width: 350px;">
            <h2 style="color: #333; margin-bottom: 10px;">⏰ Alarm Ringing!</h2>
            <p style="color: #666; margin-bottom: 20px;">Time to wake up, Kamran!</p>
            <button onclick="stopAlarm()" style="background: #ff4757; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold;">Stop Alarm</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
